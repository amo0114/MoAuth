# Aura / MoAuth — Nginx reverse proxy example (1Panel / OpenResty style)
#
# Copy snippets into your site configs. Replace oai-o.com with your domain.
# Docker Compose binds services to localhost only:
#   connect  → 127.0.0.1:13000
#   account  → 127.0.0.1:13002
#   subboost → 127.0.0.1:13001
#   zitadel       → 127.0.0.1:18080  (core API + console)
#   zitadel-login → 127.0.0.1:13003  (Login V2 UI, optional — see docker-compose profile)

# --- connect.oai-o.com ---
server {
    listen 443 ssl http2;
    server_name connect.oai-o.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- account.oai-o.com ---
server {
    listen 443 ssl http2;
    server_name account.oai-o.com;

    location / {
        proxy_pass http://127.0.0.1:13002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- app.oai-o.com (SubBoost) ---
server {
    listen 443 ssl http2;
    server_name app.oai-o.com;

    location / {
        proxy_pass http://127.0.0.1:13001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- id.oai-o.com (Zitadel — keep private) ---
server {
    listen 443 ssl http2;
    server_name id.oai-o.com;

    # Optional: allow only your office/VPN IP
    # allow 203.0.113.0/24;
    # deny all;

    # Login V2 UI (only when zitadel-login container is running)
    location /ui/v2/login/ {
        proxy_pass http://127.0.0.1:13003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}