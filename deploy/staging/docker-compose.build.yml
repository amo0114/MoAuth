services:
  connect:
    build:
      context: ../..
      dockerfile: apps/connect/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_PRODUCT_NAME: ${NEXT_PUBLIC_IDENTITY_PRODUCT_NAME:-Aura}
        NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME: ${NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME:-Aura 账号中心}
        NEXT_PUBLIC_IDENTITY_GATEWAY_NAME: ${NEXT_PUBLIC_IDENTITY_GATEWAY_NAME:-Connect}
        NEXT_PUBLIC_IDENTITY_PUBLIC_DOMAIN: ${NEXT_PUBLIC_IDENTITY_PUBLIC_DOMAIN}
        NEXT_PUBLIC_IDENTITY_ACCOUNT_URL: ${NEXT_PUBLIC_IDENTITY_ACCOUNT_URL}
        NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL: ${NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL:-support@example.com}
        NEXT_PUBLIC_IDENTITY_SLOGAN: ${NEXT_PUBLIC_IDENTITY_SLOGAN:-入本源，见真知。}
    image: ${MOAUTH_IMAGE_REGISTRY:-ghcr.io/amo0114}/moauth-connect:${MOAUTH_IMAGE_TAG:-local}

  account:
    build:
      context: ../..
      dockerfile: apps/account/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_PRODUCT_NAME: ${NEXT_PUBLIC_IDENTITY_PRODUCT_NAME:-Aura}
        NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME: ${NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME:-Aura 账号中心}
        NEXT_PUBLIC_IDENTITY_GATEWAY_NAME: ${NEXT_PUBLIC_IDENTITY_GATEWAY_NAME:-Connect}
        NEXT_PUBLIC_IDENTITY_CONNECT_URL: ${NEXT_PUBLIC_IDENTITY_CONNECT_URL}
        NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL: ${NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL:-support@example.com}
        NEXT_PUBLIC_IDENTITY_SLOGAN: ${NEXT_PUBLIC_IDENTITY_SLOGAN:-入本源，见真知。}
    image: ${MOAUTH_IMAGE_REGISTRY:-ghcr.io/amo0114}/moauth-account:${MOAUTH_IMAGE_TAG:-local}

  subboost:
    build:
      context: ../..
      dockerfile: deploy/staging/Dockerfile.subboost
      args:
        APP_RELEASE_VERSION: ${APP_RELEASE_VERSION}
        APP_BUILD_SHA: ${APP_BUILD_SHA}
        APP_VERSION: ${APP_VERSION}
        APP_VERSION_TOKEN: ${APP_VERSION_TOKEN}
    image: ${MOAUTH_IMAGE_REGISTRY:-ghcr.io/amo0114}/moauth-subboost:${MOAUTH_IMAGE_TAG:-local}