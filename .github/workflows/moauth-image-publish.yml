name: MoAuth Image Publish

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: connect
            image: moauth-connect
            dockerfile: apps/connect/Dockerfile
            build_args: |
              NEXT_PUBLIC_IDENTITY_PRODUCT_NAME=Aura
              NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME=Aura 账号中心
              NEXT_PUBLIC_IDENTITY_GATEWAY_NAME=Connect
              NEXT_PUBLIC_IDENTITY_PUBLIC_DOMAIN=connect.example.com
              NEXT_PUBLIC_IDENTITY_ACCOUNT_URL=https://account.example.com
              NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL=support@example.com
              NEXT_PUBLIC_IDENTITY_SLOGAN=入本源，见真知。
          - service: account
            image: moauth-account
            dockerfile: apps/account/Dockerfile
            build_args: |
              NEXT_PUBLIC_IDENTITY_PRODUCT_NAME=Aura
              NEXT_PUBLIC_IDENTITY_ACCOUNT_NAME=Aura 账号中心
              NEXT_PUBLIC_IDENTITY_GATEWAY_NAME=Connect
              NEXT_PUBLIC_IDENTITY_CONNECT_URL=https://connect.example.com
              NEXT_PUBLIC_IDENTITY_SUPPORT_EMAIL=support@example.com
              NEXT_PUBLIC_IDENTITY_SLOGAN=入本源，见真知。
          - service: subboost
            image: moauth-subboost
            dockerfile: deploy/staging/Dockerfile.subboost
            build_args: |
              APP_RELEASE_VERSION=${{ github.ref_name }}
              APP_BUILD_SHA=${{ github.sha }}
              APP_VERSION=${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: ${{ matrix.build_args }}